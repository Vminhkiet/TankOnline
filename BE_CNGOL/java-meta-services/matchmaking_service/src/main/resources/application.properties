spring.application.name=matchmaking-service
server.port=8085

spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=123456
spring.data.redis.database=1
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

eureka.instance.hostname=localhost
eureka.instance.prefer-ip-address=false

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.admin.fail-fast=false

# IP của Windows host chạy server_tank.exe
# Ghi đè bằng env var GAME_SERVER_HOST khi cần
game.server.host=${GAME_SERVER_HOST:172.25.192.1}
game.server.port=${GAME_SERVER_PORT:8080}
game.kafka.match-topic=match.create
