server:
  port: 8082

spring:
  application:
    name: matchmaking-service
  kafka:
    bootstrap-servers: 172.25.203.168:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
  data:
    redis:
      host: localhost
      port: 6379
      password: "123456"

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

# ── Địa chỉ Tank C++ server ────────────────────────────────────────────────────
# udp-port : Unity kết nối UDP để chơi game
# mgmt-port: Java gọi HTTP để tạo match (Tank server phải đang chạy)
tank:
  server:
    host: 10.83.136.219   # Windows WiFi IP - mobile cùng mạng kết nối UDP được
    udp-port: 8080
    mgmt-port: 9090
