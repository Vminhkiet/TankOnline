server:
  port: 8090

spring:
  application:
    name: monitoring-service
  kafka:
    bootstrap-servers: 172.25.203.168:9092
    consumer:
      group-id: monitoring-game-perf
      auto-offset-reset: latest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  boot:
    admin:
      ui:
        title: "Tank Game System Monitor"
      discovery:
        enabled: true
        # Cho phép cả các service không có Spring Boot Admin Client (chỉ cần Actuator)
        converter:
          management-context-path: /actuator

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
