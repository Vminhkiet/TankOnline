server:
  port: 8087
  error:
    include-message: always
    include-stacktrace: never

spring:
  application:
    name: profile-service
  datasource:
    url: jdbc:postgresql://localhost:5432/profile_service_db
    username: auth_user
    password: userpassword
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.PostgreSQLDialect

profile:
  default-coins: 1000
  admin-token: ${PROFILE_ADMIN_TOKEN:admin-secret-token}

eureka:
  instance:
    prefer-ip-address: true
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
